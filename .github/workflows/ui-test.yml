name: UI Progress Check

on:
  push:
  pull_request:

jobs:
  ui-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Run UI Test
        run: node tests/ui-check.js